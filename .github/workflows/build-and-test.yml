name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore ElBruno.HuggingFace.Downloader.slnx

      - name: Build
        run: dotnet build ElBruno.HuggingFace.Downloader.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ElBruno.HuggingFace.Downloader.slnx --no-build --configuration Release --verbosity normal

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Pack
        run: dotnet pack src/ElBruno.HuggingFace.Downloader/ElBruno.HuggingFace.Downloader.csproj --configuration Release --output ./nupkg

      - name: Upload NuGet Package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg
